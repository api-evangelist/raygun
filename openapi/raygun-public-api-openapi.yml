        '422':
          $ref: '#/components/responses/validation-problem-details'
        '429':
          description: Too Many Requests
      description: Returns aggregated time-series metrics data for pages
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                start:
                  type: string
                  format: date-time
                end:
                  type: string
                  format: date-time
                granularity:
                  type: string
                  example: 1h
                  pattern: ^\d+[mhd]$
                aggregation:
                  type: string
                  enum:
                  - count
                  - average
                  - median
                  - sum
                  - min
                  - max
                  - p95
                  - p99
                metrics:
                  type: array
                  items:
                    type: string
                    enum:
                    - pageViews
                    - loadTime
                    - firstPaint
                    - firstContentfulPaint
                    - firstInputDelay
                    - largestContentfulPaint
                    - cumulativeLayoutShift
                    - interactionToNextPaint
                filter:
                  type: string
                  example: pageIdentifier = abc123
                  description: 'Filters the result based on an expression. Format: "pageIdentifier = abc123" or "pageIdentifier
                    IN (abc123, def456)"'
              required:
              - start
              - end
              - granularity
              - aggregation
              - metrics
      security:
      - personal_access_token:
        - metrics:pages
      tags:
      - metrics
    parameters:
    - $ref: '#/components/parameters/application-identifier'
  /metrics/{application-identifier}/pages/histogram:
    post:
