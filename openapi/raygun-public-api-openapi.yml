        '422':
          $ref: '#/components/responses/validation-problem-details'
        '429':
          description: Too Many Requests
      description: Returns pre-bucketed histogram metrics data for pages
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                start:
                  type: string
                  format: date-time
                end:
                  type: string
                  format: date-time
                metrics:
                  type: array
                  items:
                    type: string
                    enum:
                    - loadTime
                    - firstPaint
                    - firstContentfulPaint
                    - firstInputDelay
                    - largestContentfulPaint
                    - cumulativeLayoutShift
                    - interactionToNextPaint
                filter:
                  type: string
                  example: pageIdentifier = abc123
                  description: 'Filters the result based on an expression. Format: "pageIdentifier = abc123" or "pageIdentifier
                    IN (abc123, def456)"'
              required:
              - start
              - end
              - metrics
            examples:
              Request single metric:
                value:
                  start: '2019-07-24T14:15:22Z'
                  end: '2019-08-24T14:15:22Z'
                  metrics:
                  - loadTime
              Request multiple metrics:
                value:
                  start: '2019-07-24T14:15:22Z'
                  end: '2019-08-24T14:15:22Z'
                  metrics:
                  - loadTime
                  - firstPaint
              Filter on single page:
                value:
                  start: '2019-07-24T14:15:22Z'
                  end: '2019-08-24T14:15:22Z'
                  metrics:
                  - loadTime
                  filter: pageIdentifier = abc123
              Filter on multiple pages:
                value:
                  start: '2019-07-24T14:15:22Z'
                  end: '2019-08-24T14:15:22Z'
                  metrics:
                  - loadTime
                  filter: pageIdentifier IN (abc123, def456)
      security:
      - personal_access_token:
        - metrics:pages
      tags:
      - metrics
    parameters:
    - $ref: '#/components/parameters/application-identifier'
